<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>我的日历</title>
<meta name="theme-color" content="#378ADD" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="我的日历" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --color-background-primary:#ffffff;
    --color-background-secondary:#F1EFE8;
    --color-background-tertiary:#F7F6F1;
    --color-background-info:#E6F1FB;
    --color-background-success:#EAF3DE;
    --color-background-warning:#FAEEDA;
    --color-background-danger:#FCEBEB;
    --color-text-primary:#2C2C2A;
    --color-text-secondary:#5F5E5A;
    --color-text-tertiary:#888780;
    --color-text-info:#0C447C;
    --color-text-success:#27500A;
    --color-text-warning:#633806;
    --color-text-danger:#791F1F;
    --color-border-tertiary:rgba(44,44,42,0.15);
    --color-border-secondary:rgba(44,44,42,0.3);
    --color-border-primary:rgba(44,44,42,0.4);
    --color-border-info:#378ADD;
    --color-border-danger:#E24B4A;
    --border-radius-md:8px;
    --border-radius-lg:12px;
    --border-radius-xl:16px;
    --font-sans: -apple-system, "PingFang SC", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --color-background-primary:#1c1c1a;
      --color-background-secondary:#2c2c2a;
      --color-background-tertiary:#242422;
      --color-background-info:#0C447C;
      --color-background-success:#27500A;
      --color-background-warning:#633806;
      --color-background-danger:#791F1F;
      --color-text-primary:#F1EFE8;
      --color-text-secondary:#B4B2A9;
      --color-text-tertiary:#888780;
      --color-text-info:#B5D4F4;
      --color-text-success:#C0DD97;
      --color-text-warning:#FAC775;
      --color-text-danger:#F7C1C1;
      --color-border-tertiary:rgba(241,239,232,0.15);
      --color-border-secondary:rgba(241,239,232,0.3);
      --color-border-primary:rgba(241,239,232,0.4);
    }
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family: var(--font-sans);
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    -webkit-tap-highlight-color: transparent;
  }
  button{
    font-family: var(--font-sans);
    font-size: 13px;
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    color: var(--color-text-primary);
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  button:hover{ background: var(--color-background-secondary); }
  button:active{ transform: scale(0.98); }
  input, select{
    font-family: var(--font-sans);
    font-size: 13px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    padding: 6px 8px;
    height: 36px;
  }
  input:focus, select:focus{ outline: 2px solid var(--color-border-info); outline-offset: -1px; }
  input[type="checkbox"]{ width:16px; height:16px; }

  #app{
    max-width: 920px;
    margin: 0 auto;
    padding: 1rem;
  }
  .layout{
    display:flex; gap:1rem; align-items:flex-start;
  }
  .main{ flex:1; min-width:0; }
  .sidebar{ width:170px; flex-shrink:0; }

  @media (max-width: 720px){
    .layout{ flex-direction: column; }
    .sidebar{ width:100%; display:flex; gap:1.5rem; flex-wrap:wrap; }
    .sidebar > div{ flex:1; min-width:140px; }
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1rem; gap:8px; flex-wrap:wrap;
  }
  .nav-group{ display:flex; align-items:center; gap:8px; }
  .view-group{ display:flex; gap:8px; }
  #titleLabel{ font-size:18px; font-weight:500; min-width:140px; text-align:center; }

  #weekdayHeader{
    display:grid; grid-template-columns:repeat(7,minmax(0,1fr));
    gap:1px; margin-bottom:4px;
  }
  .wd{ text-align:center; font-size:13px; color:var(--color-text-secondary); padding:4px 0; }
  .wd.weekend{ background: var(--color-background-success); border-radius: var(--border-radius-md); }

  #gridWrap{
    max-height:480px; overflow-y:auto;
    border:0.5px solid var(--color-border-tertiary);
    border-radius:var(--border-radius-md);
    position:relative;
    background: var(--color-border-tertiary);
  }
  #grid{
    display:grid; grid-template-columns:repeat(7,minmax(0,1fr));
    gap:1px; overflow:hidden; position:relative;
  }
  .day-cell{
    min-height:64px; padding:6px; cursor:pointer; position:relative;
    background: var(--color-background-primary);
  }
  .day-cell.weekend{ background: var(--color-background-success); }
  .day-cell.out-of-month{ opacity:0.35; }
  .day-num{ font-size:13px; font-weight:500; }
  .day-num.today{
    display:inline-flex; align-items:center; justify-content:center;
    width:22px; height:22px; border-radius:50%;
    background: var(--color-background-info); color: var(--color-text-info);
  }
  .day-events{ margin-top:4px; display:flex; flex-direction:column; gap:2px; }
  .day-event-tag{ font-size:11px; line-height:1.4; border-radius:var(--border-radius-md); padding:1px 4px; overflow:hidden; white-space:nowrap; }
  .day-event-tag .t{ font-size:10px; opacity:0.8; margin-right:4px; }
  .day-more{ font-size:10px; color:var(--color-text-tertiary); }

  .wk-header{
    padding:8px 6px; text-align:center; position:sticky; top:0; z-index:2;
    background: var(--color-background-primary);
  }
  .wk-header.weekend{ background: var(--color-background-success); }
  .wk-header .dn{ font-size:12px; color:var(--color-text-secondary); }
  .wk-header .dd{ font-size:16px; font-weight:500; margin-top:2px; }
  .wk-header .dd.today{
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; border-radius:50%;
    background: var(--color-background-info); color: var(--color-text-info);
  }

  .day-col{ position:relative; background: var(--color-background-primary); }
  .day-col.weekend{ background: var(--color-background-success); }
  .slot-cell{ box-sizing:border-box; padding:0 6px; position:relative; }
  .slot-cell.hour{ border-top:0.5px solid var(--color-border-secondary); }
  .slot-cell.half{ border-top:0.5px dashed var(--color-border-tertiary); }
  .hour-label{ font-size:11px; color:var(--color-text-tertiary); position:absolute; top:-6px; right:4px; }

  .evt-block{
    position:absolute; left:2px; right:2px; border-radius:var(--border-radius-md);
    font-size:11px; padding:2px 6px; overflow:hidden; cursor:pointer; z-index:1; box-sizing:border-box;
  }
  .evt-block .title{ font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .evt-block .time{ font-size:10px; opacity:0.85; }

  .sel-block{
    position:absolute; left:2px; right:2px; border-radius:var(--border-radius-md);
    background: var(--color-background-info); opacity:0.4;
    border:1px dashed var(--color-border-info); box-sizing:border-box; z-index:2;
    pointer-events:none; font-size:11px; padding:2px 6px; color: var(--color-text-info);
  }

  #hint{ font-size:13px; color:var(--color-text-secondary); margin-top:0.75rem; }

  .sidebar-title{ font-size:13px; font-weight:500; color:var(--color-text-secondary); margin:0 0 8px; }
  #categoryList{ display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
  .cat-row{ display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:var(--border-radius-md); font-size:13px; }
  .cat-row .label{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cat-row button{ width:20px; height:20px; padding:0; display:flex; align-items:center; justify-content:center; background:transparent; border:none; cursor:pointer; }

  #focusList{ display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
  .focus-row{ display:flex; align-items:center; gap:6px; }
  .focus-row input[type="text"]{ flex:1; min-width:0; }
  .focus-row button{ width:24px; height:24px; padding:0; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  .overlay{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
    align-items:center; justify-content:center; z-index:50; padding:1rem;
  }
  .overlay.show{ display:flex; }
  .dialog{
    background: var(--color-background-primary); border-radius: var(--border-radius-lg);
    border: 0.5px solid var(--color-border-tertiary); padding:1.25rem; width:300px; box-sizing:border-box;
    max-width: 100%;
  }
  .dialog h3{ font-size:15px; font-weight:500; margin:0 0 4px; }
  .dialog p{ font-size:13px; color:var(--color-text-secondary); margin:0 0 12px; }
  .dialog label{ font-size:13px; color:var(--color-text-secondary); display:block; margin-bottom:4px; }
  .dialog input, .dialog select{ width:100%; margin-bottom:12px; }
  .dialog-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
  .danger-btn{ border-color: var(--color-border-danger); color: var(--color-text-danger); }

  .full-width-btn{ width:100%; font-size:13px; }
  .full-width-btn i{ font-size:14px; vertical-align:-2px; margin-right:4px; }
</style>
</head>
<body>
<div id="app">
  <div class="layout">
    <div class="main">
      <div class="topbar">
        <div class="nav-group">
          <button id="prevBtn" aria-label="上一个"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
          <span id="titleLabel"></span>
          <button id="nextBtn" aria-label="下一个"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
        </div>
        <div class="view-group">
          <button id="monthBtn">月视图</button>
          <button id="weekBtn">周视图</button>
          <button id="todayBtn">今天</button>
        </div>
      </div>

      <div id="weekdayHeader">
        <div class="wd weekend">一</div>
        <div class="wd">二</div>
        <div class="wd">三</div>
        <div class="wd">四</div>
        <div class="wd">五</div>
        <div class="wd">六</div>
        <div class="wd weekend">日</div>
      </div>

      <div id="gridWrap">
        <div id="grid"></div>
      </div>

      <p id="hint"></p>
    </div>

    <div class="sidebar">
      <div>
        <p class="sidebar-title">分类</p>
        <div id="categoryList"></div>
        <button id="addCategoryBtn" class="full-width-btn" style="margin-bottom:1.5rem;"><i class="ti ti-plus" aria-hidden="true"></i>新建分类</button>
      </div>
      <div>
        <p class="sidebar-title">本月重点</p>
        <div id="focusList"></div>
        <button id="addFocusBtn" class="full-width-btn"><i class="ti ti-plus" aria-hidden="true"></i>添加事项</button>
      </div>
      <div>
        <p class="sidebar-title">导出当月日程</p>
        <div style="display:flex; flex-direction:column; gap:6px;">
          <button id="exportExcelBtn" class="full-width-btn"><i class="ti ti-table" aria-hidden="true"></i>导出 Excel</button>
          <button id="exportPdfBtn" class="full-width-btn"><i class="ti ti-file-type-pdf" aria-hidden="true"></i>导出 PDF</button>
          <button id="loadPresetBtn" class="full-width-btn" style="margin-top:6px;"><i class="ti ti-refresh" aria-hidden="true"></i>载入课程表</button>
        </div>
      </div>
    </div>
  </div>

  <div id="editOverlay" class="overlay">
    <div class="dialog">
      <h3>新建日程</h3>
      <p id="editTimeRange"></p>
      <label>待办事项</label>
      <input id="editTitleInput" type="text" placeholder="例如：团队周会" />
      <label>分类</label>
      <select id="editCategorySelect"></select>
      <div class="dialog-actions">
        <button id="cancelEditBtn">取消</button>
        <button id="saveEditBtn">保存</button>
      </div>
    </div>
  </div>

  <div id="confirmOverlay" class="overlay">
    <div class="dialog">
      <h3 id="confirmTitle">确认删除该日程？</h3>
      <p id="confirmDetail"></p>
      <div class="dialog-actions">
        <button id="cancelDeleteBtn">取消</button>
        <button id="confirmDeleteBtn" class="danger-btn">删除</button>
      </div>
    </div>
  </div>

  <div id="addCategoryOverlay" class="overlay">
    <div class="dialog">
      <h3>新建分类</h3>
      <label>名称</label>
      <input id="newCategoryInput" type="text" placeholder="例如：财务" />
      <p>颜色将自动分配，避免与现有分类及周末背景色重复。</p>
      <div class="dialog-actions">
        <button id="cancelAddCategoryBtn">取消</button>
        <button id="saveCategoryBtn">添加</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'mycalendar_data_v1';

  var COLOR_OPTIONS = [
    { key:'blue',   bg:'var(--color-background-info)',    text:'var(--color-text-info)' },
    { key:'purple', bg:'#EEEDFE', text:'#3C3489' },
    { key:'amber',  bg:'var(--color-background-warning)',  text:'var(--color-text-warning)' },
    { key:'red',    bg:'var(--color-background-danger)',   text:'var(--color-text-danger)' },
    { key:'pink',   bg:'#FBEAF0', text:'#993556' },
    { key:'coral',  bg:'#FAECE7', text:'#993C1D' },
    { key:'gray',   bg:'var(--color-background-secondary)', text:'var(--color-text-secondary)' }
  ];

  var today0 = new Date();

  var defaultState = {
    year: today0.getFullYear(), month: today0.getMonth(), view: 'month', weekStartIso: null,
    events: [
      { dayIso:'2026-06-16', startUnit:36, endUnit:48, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-06-17', startUnit:36, endUnit:48, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-06-19', startUnit:36, endUnit:48, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-06-20', startUnit:16, endUnit:28, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-06-22', startUnit:16, endUnit:28, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-06-24', startUnit:16, endUnit:28, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-06-26', startUnit:36, endUnit:48, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-07-01', startUnit:16, endUnit:28, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-07-01', startUnit:36, endUnit:48, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-07-02', startUnit:16, endUnit:28, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-07-02', startUnit:36, endUnit:48, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-07-07', startUnit:16, endUnit:28, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-07-07', startUnit:36, endUnit:48, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-07-09', startUnit:16, endUnit:28, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-07-09', startUnit:36, endUnit:48, grade:'G1-Bio', student:'魏子涵', categoryId:'work' },
      { dayIso:'2026-07-13', startUnit:16, endUnit:28, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-07-15', startUnit:16, endUnit:28, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-07-17', startUnit:16, endUnit:28, grade:'G2-Bio', student:'徐欣语', categoryId:'work' },
      { dayIso:'2026-07-14', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-15', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-16', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-17', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-18', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-21', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-22', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-23', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-24', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' },
      { dayIso:'2026-07-25', startUnit:3, endUnit:15, grade:'G1-Bio', student:'2026年国交G1衔接班六期', categoryId:'work' }
    ],
    categories: [
      { id:'work', name:'工作', color:'blue' },
      { id:'study', name:'学习', color:'purple' },
      { id:'health', name:'健康', color:'amber' },
      { id:'other', name:'其他', color:'gray' }
    ],
    focusItems: [
      { id:'f1', text:'', done:false },
      { id:'f2', text:'', done:false },
      { id:'f3', text:'', done:false },
      { id:'f4', text:'', done:false },
      { id:'f5', text:'', done:false }
    ]
  };

  var state;
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    state = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(defaultState));
  } catch(e){
    state = JSON.parse(JSON.stringify(defaultState));
  }
  // runtime-only fields
  state.pendingDelete = null;
  state.pendingCreate = null;
  state.weekStart = state.weekStartIso ? new Date(state.weekStartIso) : null;

  function persist(){
    try {
      var toSave = {
        year: state.year, month: state.month, view: state.view,
        weekStartIso: state.weekStart ? fmtIso(state.weekStart) : null,
        events: state.events, categories: state.categories, focusItems: state.focusItems
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    } catch(e){}
  }

  var grid = document.getElementById('grid');
  var gridWrap = document.getElementById('gridWrap');
  var titleLabel = document.getElementById('titleLabel');
  var weekdayHeader = document.getElementById('weekdayHeader');
  var hint = document.getElementById('hint');
  var categoryList = document.getElementById('categoryList');
  var addCategoryBtn = document.getElementById('addCategoryBtn');
  var focusList = document.getElementById('focusList');
  var addFocusBtn = document.getElementById('addFocusBtn');

  var confirmOverlay = document.getElementById('confirmOverlay');
  var confirmDetail = document.getElementById('confirmDetail');
  var confirmTitle = document.getElementById('confirmTitle');
  var confirmDeleteBtn = document.getElementById('confirmDeleteBtn');

  var editOverlay = document.getElementById('editOverlay');
  var editTimeRange = document.getElementById('editTimeRange');
  var editTitleInput = document.getElementById('editTitleInput');
  var editCategorySelect = document.getElementById('editCategorySelect');

  var addCategoryOverlay = document.getElementById('addCategoryOverlay');
  var newCategoryInput = document.getElementById('newCategoryInput');

  var monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  var headerNames = ['一','二','三','四','五','六','日'];
  var SLOT_HEIGHT = 24;
  var TOTAL_SLOTS = 32;
  var SUBSLOT = 3;
  var UNIT_HEIGHT = SLOT_HEIGHT / SUBSLOT;
  var TOTAL_UNITS = TOTAL_SLOTS * SUBSLOT;

  function getCategory(id){
    return state.categories.find(function(c){ return c.id === id; }) || state.categories[state.categories.length-1] || { id:'other', name:'其他', color:'gray' };
  }
  // returns array of display lines for an event: [grade, student] or [title]
  function eventLines(ev){
    if (ev.grade || ev.student){
      var lines = [];
      if (ev.grade) lines.push(ev.grade);
      if (ev.student) lines.push(ev.student);
      return lines;
    }
    return [ev.title || '新日程'];
  }
  function eventPlainTitle(ev){
    return eventLines(ev).join(' ');
  }
  function getColor(key){
    return COLOR_OPTIONS.find(function(c){ return c.key === key; }) || COLOR_OPTIONS[0];
  }
  function nextAvailableColor(){
    var used = state.categories.map(function(c){ return c.color; });
    for (var i=0;i<COLOR_OPTIONS.length;i++){
      if (used.indexOf(COLOR_OPTIONS[i].key) === -1) return COLOR_OPTIONS[i].key;
    }
    var counts = {};
    COLOR_OPTIONS.forEach(function(o){ counts[o.key]=0; });
    used.forEach(function(k){ if (counts[k]!==undefined) counts[k]++; });
    var best = COLOR_OPTIONS[0].key, bestCount = Infinity;
    COLOR_OPTIONS.forEach(function(o){
      if (counts[o.key] < bestCount){ bestCount = counts[o.key]; best = o.key; }
    });
    return best;
  }

  function startOfWeek(d){
    var date = new Date(d);
    var jsDay = date.getDay();
    var diff = (jsDay === 0) ? -6 : 1 - jsDay;
    date.setDate(date.getDate() + diff);
    date.setHours(0,0,0,0);
    return date;
  }
  function isSameDay(a,b){
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }
  function isHighlightCol(colIndex){
    return colIndex === 0 || colIndex === 6;
  }
  function fmtIso(d){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  function unitToTime(unit){
    var totalMin = 8*60 + unit*10;
    var h = Math.floor(totalMin/60);
    var m = totalMin%60;
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  }

  function render(){
    grid.innerHTML = '';

      titleLabel.textContent = state.year + '年 ' + monthNames[state.month];

      var firstOfMonth = new Date(state.year, state.month, 1);
      var gridStart = startOfWeek(firstOfMonth);

      var lastOfMonth = new Date(state.year, state.month+1, 0);
      var lastWeekStart = startOfWeek(lastOfMonth);
      var numWeeks = Math.round((lastWeekStart - gridStart) / (7*86400000)) + 1;

      grid.style.gridTemplateColumns = 'repeat(7,minmax(0,1fr))';

      for (var w=0; w<numWeeks; w++){

          num.textContent = d.getDate();
          cell.appendChild(num);

          var dayEvents = state.events.filter(function(e){ return e.dayIso === fmtIso(d); }).sort(function(a,b){ return a.startUnit - b.startUnit; });
          if (dayEvents.length > 0){
            var listWrap = document.createElement('div');
            listWrap.className = 'day-events';
            var shown = dayEvents.slice(0,3);
            shown.forEach(function(ev){
              var col = getColor(getCategory(ev.categoryId).color);

          }

          (function(ws){
            cell.addEventListener('click', function(){
              state.weekStart = ws;
              state.view = 'week';
              persist();
              render();
            });
          })(weekStart);

          grid.appendChild(cell);
        }

    } else {
      weekdayHeader.style.display = 'none';
      hint.textContent = '按住鼠标（或手指拖动）在某一天的时间格上下拖拽（精度10分钟），松开后填写待办内容并选择分类即可创建日程；点击已创建的日程会弹出确认删除对话框。';

      gridWrap.style.overflowY = 'auto';

      var ws = state.weekStart || startOfWeek(new Date(state.year, state.month, 1));
      var we = new Date(ws);
      we.setDate(we.getDate()+6);

      var label;
      if (ws.getMonth() === we.getMonth()){
        label = ws.getFullYear()+'年 '+monthNames[ws.getMonth()]+' '+ws.getDate()+'-'+we.getDate()+'日';
      } else {
        label = monthNames[ws.getMonth()]+ws.getDate()+'日 - '+monthNames[we.getMonth()]+we.getDate()+'日';
      }
      titleLabel.textContent = label;

      grid.style.gridTemplateColumns = '40px repeat(7,minmax(0,1fr))';

      // top-left corner cell (empty, sits above the time column)
      var corner = document.createElement('div');

        h.appendChild(dn);

      }

      // dedicated time-label column
      var timeCol = document.createElement('div');
      timeCol.style.position = 'relative';
      timeCol.style.background = 'var(--color-background-primary)';
      for (var st=0; st<TOTAL_SLOTS; st++){
        var isHourStartT = (st % 2 === 0);

  // ---- drag-to-create (mouse + touch) ----
  function attachDragHandlers(col){
    var dragState = null;

    function unitFromClientY(clientY){
      var rect = col.getBoundingClientRect();
      var y = clientY - rect.top;
      var unit = Math.floor(y / UNIT_HEIGHT);
      if (unit < 0) unit = 0;
      if (unit > TOTAL_UNITS) unit = TOTAL_UNITS;
      return unit;
    }

    function showSelection(){
      var old = col.querySelector('.sel-block');
      if (old) old.remove();
      if (!dragState) return;
      var s = Math.min(dragState.startUnit, dragState.currentUnit);
      var e = Math.max(dragState.startUnit, dragState.currentUnit);
      if (e <= s) e = s + 1;
      var block = document.createElement('div');
      block.className = 'sel-block';
      block.style.top = (s * UNIT_HEIGHT + 1) + 'px';
      block.style.height = ((e - s) * UNIT_HEIGHT - 2) + 'px';
      block.textContent = unitToTime(s) + '-' + unitToTime(e);
      col.appendChild(block);
    }

    function startDrag(clientY, target){
      if (target && target.closest && target.closest('.evt-block')) return false;
      var unit = unitFromClientY(clientY);
      dragState = { startUnit: unit, currentUnit: unit+1 };
      showSelection();
      return true;
    }

    function moveDrag(clientY){
      if (!dragState) return;
      dragState.currentUnit = unitFromClientY(clientY);
      showSelection();
    }

    function finishDrag(){
      if (!dragState) return;
      var s = Math.min(dragState.startUnit, dragState.currentUnit);
      var e = Math.max(dragState.startUnit, dragState.currentUnit);
      if (e <= s) e = s + 1;
      if (e > TOTAL_UNITS) e = TOTAL_UNITS;

      dragState = null;
      var old = col.querySelector('.sel-block');
      if (old) old.remove();

      openCreate(col.dataset.dayIso, s, e);
    }

    // mouse
    col.addEventListener('mousedown', function(evt){
      if (!startDrag(evt.clientY, evt.target)) return;
      evt.preventDefault();
    });
    col.addEventListener('mousemove', function(evt){
      moveDrag(evt.clientY);
    });
    document.addEventListener('mouseup', function(){
      if (dragState) finishDrag();
    });

    // touch
    col.addEventListener('touchstart', function(evt){
      var touch = evt.touches[0];
      if (!startDrag(touch.clientY, evt.target)) return;
      evt.preventDefault();
    }, { passive: false });
    col.addEventListener('touchmove', function(evt){
      if (!dragState) return;
      var touch = evt.touches[0];
      moveDrag(touch.clientY);
      evt.preventDefault();
    }, { passive: false });
    col.addEventListener('touchend', function(evt){
      if (dragState) finishDrag();
    });
  }

      .slice()
      .sort(function(a,b){

        return a.startUnit - b.startUnit;

    } else {
      state.weekStart.setDate(state.weekStart.getDate()-7);
    }
    persist();
    render();
  });

  document.getElementById('nextBtn').addEventListener('click', function(){
    if (state.view === 'month'){
      state.month++;
      if (state.month > 11){ state.month = 0; state.year++; }
    } else {
      state.weekStart.setDate(state.weekStart.getDate()+7);
    }
    persist();
    render();
  });

  // register service worker for offline/installable support
  if ('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }

  renderCategories();
  renderFocusList();
  render();
})();
</script>
</body>
</html>
